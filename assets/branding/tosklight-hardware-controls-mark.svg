<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">ToskLight Hardware Controls mark</title>
  <desc id="description">Three ascending control faders on a transparent background.</desc>
  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cdd7e4"/>
      <stop offset="0.4" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9c4d2"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbd5e2"/>
