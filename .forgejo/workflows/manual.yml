name: Operator manual

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-${{ forgejo.ref }}
  cancel-in-progress: ${{ !startsWith(forgejo.ref, 'refs/tags/') }}

jobs:
  manual:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build and verify PDF and HTML manuals
        run: |
          if [[ "${{ forgejo.ref_name }}" == v* ]]; then
            export LIGHT_MANUAL_VERSION="${{ forgejo.ref_name }}"
            LIGHT_MANUAL_VERSION="${LIGHT_MANUAL_VERSION#v}"
            export LIGHT_MANUAL_VERSION
          fi
          npm run manual
      - name: Attach manuals to the hosted release
        if: startsWith(forgejo.ref, 'refs/tags/v')
        env:
          FORGEJO_SERVER_URL: ${{ forgejo.server_url }}
          FORGEJO_REPOSITORY: ${{ forgejo.repository }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          python3 tools/publish_forgejo_manual.py \
            --tag "${{ forgejo.ref_name }}" \
            --file "$(npm run --silent artifact-path -- manual-pdf)" \
            --asset-name "tosklight-manual-${{ forgejo.ref_name }}.pdf"
          python3 tools/publish_forgejo_manual.py \
            --tag "${{ forgejo.ref_name }}" \
            --file "$(npm run --silent artifact-path -- manual-html)" \
            --asset-name "tosklight-manual-${{ forgejo.ref_name }}-html.zip"
