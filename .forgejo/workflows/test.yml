name: Test

on:
  push:
  pull_request:

concurrency:
  group: test-${{ forgejo.ref }}
  cancel-in-progress: ${{ forgejo.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://code.forgejo.org/actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/control-ui/package-lock.json }
      - run: npm ci
        working-directory: apps/control-ui
      - run: npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { suite: api, shard: 1/1, artifact: api }
          - { suite: ui, shard: 1/1, artifact: ui }
          - { suite: supplemental, shard: 1/1, artifact: supplemental }
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://code.forgejo.org/actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/control-ui/package-lock.json }
      - run: npm ci
        working-directory: apps/control-ui
      - run: npx playwright install --with-deps chrome
        working-directory: apps/control-ui
      - run: npm run test:e2e-${{ matrix.suite }} -- --shard=${{ matrix.shard }}
      - uses: https://code.forgejo.org/actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-${{ matrix.artifact }}
          path: .artifacts/test/results

  # Semantic release lives here, not on the GitHub mirror: the tag is only created once
  # the authoritative suite has passed on main. semantic-release analyzes the commits,
  # bumps every manifest via tools/set-version.mjs, commits the changelog and lockfile,
  # and pushes a v* tag. The GitHub mirror reacts to that tag to build and deploy.
  release:
    needs: [unit, e2e]
    if: forgejo.ref == 'refs/heads/main' && forgejo.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          # Persisted so @semantic-release/git can push the release commit and tag.
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://code.forgejo.org/actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install semantic-release
        run: npm ci
      - name: Release
        env:
          # env-ci reads these; Forgejo Actions exposes the GITHUB_* names for compatibility.
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          GIT_AUTHOR_NAME: Forgejo CI
          GIT_AUTHOR_EMAIL: ci@tokenet.de
          GIT_COMMITTER_NAME: Forgejo CI
          GIT_COMMITTER_EMAIL: ci@tokenet.de
        run: npx semantic-release

  desktop-smoke:
    runs-on: macos-14
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://code.forgejo.org/actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/control-ui/package-lock.json }
      - run: npm ci
        working-directory: apps/control-ui
      - run: npm run test:desktop-smoke
      - uses: https://code.forgejo.org/actions/upload-artifact@v4
        if: failure()
        with: { name: desktop-smoke-data, path: .artifacts/build/cargo/debug/bundle/macos }
