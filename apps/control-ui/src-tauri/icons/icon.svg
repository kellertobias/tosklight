<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">ToskLight application icon</title>
  <desc id="description">A white triangular play mark containing a theatrical spotlight and a blue beam on a dark navy tile.</desc>
  <defs>
    <linearGradient id="tile" x1="176" y1="82" x2="842" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1731"/>
      <stop offset="0.5" stop-color="#061026"/>
      <stop offset="1" stop-color="#020713"/>
    </linearGradient>
    <radialGradient id="tileGlow" cx="512" cy="412" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15346a" stop-opacity="0.38"/>
      <stop offset="0.58" stop-color="#07152e" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="516" y1="427" x2="704" y2="718" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c9f5ff" stop-opacity="0.98"/>
      <stop offset="0.24" stop-color="#70dcff" stop-opacity="0.92"/>
      <stop offset="0.68" stop-color="#27aaf5" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#1261c2" stop-opacity="0.48"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.35" cy="0.28" r="0.9">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.54" stop-color="#d8f8ff"/>
      <stop offset="1" stop-color="#72d8ff"/>
    </radialGradient>
    <filter id="tileShadow" x="-20%" y="-18%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="markGlow" x="-20%" y="-25%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#62d8ff" flood-opacity="0.22"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="54" y="42" width="916" height="916" rx="198"/>
    </clipPath>
  </defs>

  <rect x="54" y="42" width="916" height="916" rx="198" fill="url(#tile)" filter="url(#tileShadow)"/>
  <g clip-path="url(#tileClip)">
    <rect x="54" y="42" width="916" height="916" fill="url(#tileGlow)"/>
  </g>
  <rect x="57" y="45" width="910" height="910" rx="195" fill="none" stroke="#7b9ed2" stroke-opacity="0.18" stroke-width="6"/>

  <g filter="url(#markGlow)">
    <path d="M355 740V326c0-74 52-103 116-65l330 196c66 39 66 91 1 135L468 817c-63 42-113 14-113-77Z" fill="none" stroke="#f8fbff" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M357 361c25-50 70-59 115-26l80 59" fill="none" stroke="#f8fbff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M358 385 458 475" fill="none" stroke="#f8fbff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M420 424c10-50 50-78 94-66 46 13 68 54 54 99" fill="none" stroke="#f8fbff" stroke-width="32" stroke-linecap="round"/>
    <path d="M532 427 796 553 655 716Z" fill="url(#beam)" stroke="#9de8ff" stroke-width="8" stroke-linejoin="round"/>
    <ellipse cx="522" cy="425" rx="36" ry="31" transform="rotate(-24 522 425)" fill="url(#lens)"/>
    <path d="M500 409c10-12 27-17 41-10" fill="none" stroke="#ffffff" stroke-opacity="0.68" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
