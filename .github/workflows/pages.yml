name: Pages

# Runs on the GitHub mirror only. The test suite lives on Forgejo, which tags the release;
# this publishes the product page for that tag.
#
# The trigger is `release: published`, not the tag push: the page lists the actual release
# assets, so it must run after the Release workflow has finished uploading them. Building on
# every push to main would also stamp the page with an unreleased version.
#
# Branch pushes build the site and upload it as a workflow artifact for inspection, but
# do not deploy: deploying from a branch would replace the live site with an unreleased
# version whose download links point at assets that do not exist.
on:
  release:
    types: [published]
  push:
    branches: [refactoring]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish the site for. Empty builds the branch.
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Scoped by ref so a branch preview never cancels an in-flight release deployment.
  group: pages-${{ github.event.inputs.tag || github.event.release.tag_name || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out the tagged commit so the manual and landing page carry the released
      # version. Empty on a branch push, where the checked-out ref is already correct.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/help/.tooling/requirements.txt

      # The PDF manual is rendered with WeasyPrint, which needs the system Pango stack.
      - name: Install manual rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0

      - name: Assemble the public site
        run: npm run pages:generate

      - name: Resolve the assembled site directory
        id: site
        run: echo "path=$(npm run --silent artifact-path -- pages)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.path }}

  # Release-only. A branch build stops after `build`; download its pages artifact from the
  # run to inspect the assembled site without touching the published one.
  deploy:
    needs: build
    if: github.event_name == 'release' || startsWith(github.event.inputs.tag, 'v')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
