name: Pages

# Runs on the GitHub mirror only. The test suite lives on Forgejo, which tags the release;
# this publishes the product page for that tag.
#
# The trigger is `release: published`, not the tag push: the page lists the actual release
# assets, so it must run after the Release workflow has finished uploading them. Building on
# every push to main would also stamp the page with an unreleased version.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish the site for
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the tagged commit so the manual and landing page carry the released version.
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/help/.tooling/requirements.txt

      # The PDF manual is rendered with WeasyPrint, which needs the system Pango stack.
      - name: Install manual rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0

      - name: Assemble the public site
        run: ./build pages

      - name: Resolve the assembled site directory
        id: site
        run: echo "path=$(./build path pages)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
