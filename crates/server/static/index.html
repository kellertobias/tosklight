<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Light Control Server</title>
<style>
:root{color-scheme:dark;font:15px system-ui,sans-serif;background:#0b0d12;color:#eef1f6}*{box-sizing:border-box}body{margin:0}.top{position:sticky;top:0;z-index:2;display:flex;gap:1rem;align-items:center;padding:.8rem 1rem;background:#141824;border-bottom:1px solid #303747}.top h1{font-size:1.1rem;margin:0}.grow{flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1rem;padding:1rem}.card{background:#171b26;border:1px solid #2c3343;border-radius:.7rem;padding:1rem;min-width:0}.card h2{font-size:1rem;margin:0 0 .8rem}.row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin:.4rem 0}button,input,select{font:inherit;padding:.55rem .7rem;border-radius:.4rem;border:1px solid #465067;background:#202636;color:inherit}button{cursor:pointer}button:hover{background:#30394e}.danger{background:#6f1720}.active{color:#72e69b}.muted{color:#9ca6b9}.item{padding:.55rem 0;border-top:1px solid #2b3140}.item:first-child{border:0}table{width:100%;border-collapse:collapse}td,th{text-align:left;padding:.4rem;border-bottom:1px solid #2b3140}pre{white-space:pre-wrap;max-height:17rem;overflow:auto;font-size:.8rem}.hidden{display:none}.error{position:fixed;right:1rem;bottom:1rem;max-width:32rem;background:#8c2430;padding:.8rem;border-radius:.5rem}input[type=range]{padding:0;width:11rem}@media(max-width:600px){.grid{padding:.5rem;grid-template-columns:1fr}.top{flex-wrap:wrap}}
</style></head><body>
<header class="top"><h1>Light</h1><span id="health" class="muted">Connecting…</span><span class="grow"></span><input id="deskToken" type="password" placeholder="Desk token (optional)" aria-label="Desk boundary token"><select id="user"></select><button id="login">Select user</button><span id="session" class="muted"></span></header>
<main class="grid">
<section class="card"><h2>Master</h2><div class="row"><label>Grand master <input id="grandMaster" type="range" min="0" max="1" step=".01" value="1"></label><output id="masterValue">100%</output><button id="blackout" class="danger">Blackout</button></div><div id="timecode" class="muted">No timecode</div></section>
<section class="card"><h2>Show library</h2><div class="row"><input id="showFile" type="file" accept=".show,application/vnd.light.show"><label><input id="overwrite" type="checkbox"> overwrite same name</label><button id="upload">Upload</button><button id="rollback">Rollback</button></div><div id="shows"></div></section>
<section class="card"><h2>Cue lists</h2><div id="playbacks" class="muted">Open a show to see cue lists.</div></section>
<section class="card"><h2>Active programmers</h2><div id="programmers"></div></section>
<section class="card"><h2>Patch</h2><div style="overflow:auto"><table><thead><tr><th>Fixture</th><th>Model/mode</th><th>Universe</th><th>Address</th></tr></thead><tbody id="patch"></tbody></table></div></section>
<section class="card"><h2>Server configuration</h2><div class="row"><label>Frame rate <input id="frameRate" type="number" min="40" max="44"></label><label>Output bind <input id="outputBind"></label></div><div class="row"><label>OSC <input id="oscBind" placeholder="0.0.0.0:8000"></label><label>ArtTimeCode <input id="artBind" placeholder="0.0.0.0:6454"></label></div><div class="row"><label>RTP-MIDI <input id="rtpBind" placeholder="0.0.0.0:5004"></label><label>Backups <input id="backupRetention" type="number" min="1"></label><button id="saveConfig">Save</button></div><small id="restart" class="muted"></small></section>
<section class="card"><h2>Diagnostics</h2><pre id="diagnostics"></pre></section>
</main><div id="error" class="error hidden"></div>
<script>
const $=id=>document.getElementById(id);let token=sessionStorage.getItem('light.token')||'',sessionId=sessionStorage.getItem('light.session')||'',deskToken=localStorage.getItem('light.deskToken')||'',events,configuration,blackout=false,refreshTimer;$('deskToken').value=deskToken;
async function api(path,options={}){deskToken=$('deskToken').value;localStorage.setItem('light.deskToken',deskToken);options.headers={...(options.body?{'Content-Type':'application/json'}:{}),...(token?{Authorization:`Bearer ${token}`}:{}) ,...(deskToken?{'X-Light-Desk-Token':deskToken}:{})};const response=await fetch('/api/v1'+path,options);if(!response.ok){let body=await response.json().catch(()=>({error:response.statusText}));throw Error(body.error||response.statusText)}if(response.status===204)return null;return response.headers.get('content-type')?.includes('json')?response.json():response}
function fail(error){$('error').textContent=error.message;$('error').classList.remove('hidden');setTimeout(()=>$('error').classList.add('hidden'),6000)}
function connectEvents(){events?.close();const protocols=['light.v1',`light.token.${token}`];if(deskToken)protocols.push(`light.desk.${deskToken}`);events=new WebSocket(location.origin.replace('http','ws')+'/api/v1/events',protocols);events.onmessage=()=>scheduleRefresh();events.onclose=()=>{$('health').textContent='Events disconnected'}}
function scheduleRefresh(){clearTimeout(refreshTimer);refreshTimer=setTimeout(refresh,80)}
async function initial(){try{const bootstrap=await api('/bootstrap');$('user').innerHTML=bootstrap.users.filter(u=>u.enabled).map(u=>`<option>${escapeHtml(u.name)}</option>`).join('');renderBootstrap(bootstrap);if(token){$('session').textContent=sessionStorage.getItem('light.user')||'Restored session';connectEvents();await refresh()}else await renderShows()}catch(e){sessionStorage.clear();token='';fail(e)}}
async function login(){try{const result=await api('/sessions',{method:'POST',body:JSON.stringify({username:$('user').value})});token=result.token;sessionId=result.session_id;sessionStorage.setItem('light.token',token);sessionStorage.setItem('light.session',sessionId);sessionStorage.setItem('light.user',result.user.name);$('session').textContent=result.user.name;connectEvents();await refresh()}catch(e){fail(e)}}
async function refresh(){try{const [bootstrap,shows,patch,playbacks,diagnostics,config]=await Promise.all([api('/bootstrap'),api('/shows'),api('/patch'),api('/playbacks'),api('/diagnostics'),api('/configuration')]);renderBootstrap(bootstrap);renderShows(shows);renderPatch(patch);renderPlaybacks(playbacks);$('diagnostics').textContent=JSON.stringify(diagnostics,null,2);renderConfig(config.configuration)}catch(e){fail(e)}}
function renderBootstrap(b){$('health').textContent=`${b.output_health.frame_hz||0} Hz · ${b.output_health.deadline_misses} misses`;$('health').className=b.output_health.send_errors?'':'active';$('timecode').textContent=b.active_timecode_source?`Timecode: ${b.active_timecode_source}`:'No timecode';$('programmers').innerHTML=b.active_programmers.map(p=>`<div class=item><b>${p.connected?'●':'○'} ${short(p.user_id)}</b> · ${p.values.length} values · priority ${p.priority} ${b.active_programmers.length>1?`<button onclick="clearProgrammer('${p.session_id}')">Clear</button>`:''}</div>`).join('')||'<span class=muted>None</span>'}
async function renderShows(items){items=items||await api('/shows');const active=(await api('/bootstrap')).active_show?.id;$('shows').innerHTML=items.map(s=>`<div class=item><b class="${s.id===active?'active':''}">${escapeHtml(s.name)}</b><div class=row><select id="transition-${s.id}"><option value=safe_blackout>Safe blackout</option><option value=hold_current>Hold current</option><option value=timed_fade>Timed fade</option></select><button onclick="openShow('${s.id}')">Open</button><button onclick="downloadShow('${s.id}','${escapeAttr(s.name)}')">Download</button></div></div>`).join('')||'<span class=muted>No shows uploaded.</span>'}
function renderPatch(p){$('patch').innerHTML=p.fixtures.map(f=>`<tr><td>${short(f.fixture_id)}</td><td>${escapeHtml(f.definition.manufacturer)} ${escapeHtml(f.definition.model)} / ${escapeHtml(f.definition.mode)}</td><td>${f.universe}</td><td>${f.address}</td></tr>`).join('')}
function renderPlaybacks(p){const active=new Map(p.active.map(a=>[a.cue_list_id,a]));$('playbacks').innerHTML=p.cue_lists.map(c=>`<div class=item><b>${escapeHtml(c.name)}</b> ${active.has(c.id)?`<span class=active>Cue ${c.cues[active.get(c.id).cue_index]?.number}</span>`:''}<div class=row><button onclick="playback('${c.id}','go')">Go</button><button onclick="playback('${c.id}','back')">Back</button><button onclick="playback('${c.id}','pause')">Pause</button><button onclick="playback('${c.id}','release')">Release</button></div></div>`).join('')||'<span class=muted>No cue lists.</span>'}
function renderConfig(c){configuration=c;$('frameRate').value=c.frame_rate_hz;$('outputBind').value=c.output_bind_ip;$('oscBind').value=c.osc_bind||'';$('artBind').value=c.art_timecode_bind||'';$('rtpBind').value=c.rtp_midi_bind||'';$('backupRetention').value=c.backup_retention}
async function openShow(id){try{const transition=$(`transition-${id}`).value;await api(`/shows/${id}/open`,{method:'POST',body:JSON.stringify({transition,transition_millis:1000})});await refresh()}catch(e){fail(e)}}
async function playback(id,action){try{await api(`/playbacks/${id}/${action}`,{method:'POST'});await refresh()}catch(e){fail(e)}}async function clearProgrammer(id){try{await api(`/programmers/${id}/clear`,{method:'POST'});await refresh()}catch(e){fail(e)}}
async function upload(){try{const file=$('showFile').files[0];if(!file)throw Error('Choose a show file.');const bytes=new Uint8Array(await file.arrayBuffer());let binary='';for(let i=0;i<bytes.length;i+=32768)binary+=String.fromCharCode(...bytes.subarray(i,i+32768));await api('/shows',{method:'POST',body:JSON.stringify({name:file.name.replace(/\.show$/i,''),data_base64:btoa(binary),overwrite:$('overwrite').checked})});await refresh()}catch(e){fail(e)}}
async function downloadShow(id,name){try{const response=await api(`/shows/${id}/download`);const blob=await response.blob();const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=name+'.show';link.click();URL.revokeObjectURL(link.href)}catch(e){fail(e)}}
async function saveConfig(){try{const next={...configuration,frame_rate_hz:+$('frameRate').value,output_bind_ip:$('outputBind').value,osc_bind:$('oscBind').value||null,art_timecode_bind:$('artBind').value||null,rtp_midi_bind:$('rtpBind').value||null,backup_retention:+$('backupRetention').value};const result=await api('/configuration',{method:'PUT',body:JSON.stringify(next)});$('restart').textContent=result.requires_restart?'Restart required for changed input/bind sockets.':'Applied live.';renderConfig(result.configuration)}catch(e){fail(e)}}
async function setMaster(){try{await api('/master',{method:'PUT',body:JSON.stringify({grand_master:+$('grandMaster').value})});$('masterValue').textContent=Math.round($('grandMaster').value*100)+'%'}catch(e){fail(e)}}async function toggleBlackout(){try{blackout=!blackout;await api('/master',{method:'PUT',body:JSON.stringify({blackout})});$('blackout').textContent=blackout?'Release blackout':'Blackout'}catch(e){fail(e)}}
const short=id=>String(id).slice(0,8),escapeHtml=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),escapeAttr=escapeHtml;
$('login').onclick=login;$('deskToken').onchange=initial;$('upload').onclick=upload;$('rollback').onclick=()=>api('/shows/rollback',{method:'POST',body:JSON.stringify({transition:'safe_blackout'})}).then(refresh).catch(fail);$('saveConfig').onclick=saveConfig;$('grandMaster').oninput=setMaster;$('blackout').onclick=toggleBlackout;initial();
</script></body></html>
